services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build
    command: echo "frontend build only"

  app:
    build: .
    ports:
      - "80:80"
      - "5000:5000"
    env_file:
      - .env
    environment:
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  dev-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build
    image: node:20-alpine
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python -m flask --app backend.app run --host 0.0.0.0 --port 5000 --reload"
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
    profiles:
      - dev

  dev-frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
    profiles:
      - dev
